name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          # macOS Intel
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          # Linux x64（.deb + .rpm + AppImage）
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          # Linux arm64（.deb + .rpm + AppImage）
          - platform: ubuntu-22.04-arm
            args: ""
            rust-targets: ""
          # Windows x64（NSIS 安装包 .exe）
          - platform: windows-latest
            args: ""
            rust-targets: ""
          # Windows x86 32 位（NSIS 安装包 .exe）
          - platform: windows-latest
            args: --target i686-pc-windows-msvc
            rust-targets: i686-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # rust-toolchain.toml 钉死了工具链版本，dtolnay 的 targets 装在 stable 上不生效；
      # 在仓库目录内显式 add，遵循 toml override，把交叉 target 装到实际使用的工具链上。
      - name: Add cross-compile Rust target
        if: matrix.rust-targets != ''
        run: rustup target add ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CC Switch ${{ github.ref_name }}"
          releaseBody: "macOS (Apple Silicon / Intel)、Windows (x64 / x86)、Linux (x64 / arm64，.deb / .rpm / AppImage) 安装包见 Assets。macOS 包未签名，首次打开需在「系统设置 → 隐私与安全性」中允许。"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
